<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sıralama Etkinliği</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%23e30a17'/%3E%3Ccircle cx='42' cy='50' r='24' fill='white'/%3E%3Ccircle cx='50' cy='50' r='19' fill='%23e30a17'/%3E%3Cpolygon points='70,35 74,46 86,46 77,53 80,65 70,58 60,65 63,53 54,46 66,46' fill='white'/%3E%3C/svg%3E">

  <style>
    :root {
      --card: rgba(255,255,255,.93);
      --text: #17202a;
      --line: rgba(208,213,221,.9);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --ok: #16a34a;
      --wrong: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
        url("leo-futuristic-bg.png") center / cover no-repeat fixed,
        #e5e7eb;
      color: var(--text);
      padding: 4px;
    }

    .wrap {
      width: min(780px, calc(100vw - 8px));
      height: calc(var(--app-height, 100vh) - 8px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .topbar {
      height: 36px;
      min-height: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      flex: 0 0 36px;
    }

    .controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 6px 10px;
      font-weight: 800;
      cursor: pointer;
      background: #111827;
      color: white;
      font-size: 13px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      touch-action: manipulation;
    }

    button.check { background: var(--blue); }
    button.check:hover:not(:disabled) { background: var(--blue-dark); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .shuffle-icon {
      width: 15px;
      height: 15px;
      color: currentColor;
      flex: 0 0 auto;
    }

    .countdown {
      width: 40px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(37,99,235,.35);
      font-size: 18px;
      font-weight: 900;
      color: #1d4ed8;
      box-shadow: 0 3px 10px rgba(16,24,40,.14);
      visibility: hidden;
    }

    .countdown.show { visibility: visible; }

    .board {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(11, minmax(0, 1fr));
      gap: 4px;
      touch-action: none;
    }

    .row {
      min-height: 0;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: center;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 11px;
      padding: 5px 8px;
      box-shadow: 0 2px 8px rgba(16,24,40,.10);
      backdrop-filter: blur(4px);
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
      overflow: hidden;
      cursor: grab;
    }

    .row.locked { cursor: default; }

    .row.dragging {
      opacity: .25;
      transform: scale(.99);
      cursor: grabbing;
    }

    .row.drop-target {
      border-color: #2563eb;
      background: rgba(219,234,254,.96);
      box-shadow: 0 0 0 3px rgba(37,99,235,.2);
    }

    .row.flash-correct {
      border-color: var(--ok);
      background: rgba(220,252,231,.94);
    }

    .row.flash-wrong {
      border-color: var(--wrong);
      background: rgba(254,226,226,.94);
    }

    .drag-clone {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
      opacity: .97;
      transform: scale(1.03);
      box-shadow: 0 18px 36px rgba(0,0,0,.28);
      cursor: grabbing;
    }

    .num {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #f2f4f7;
      font-weight: 900;
      color: #344054;
      font-size: 12px;
      flex-shrink: 0;
    }

    .flash-correct .num { background: #bbf7d0; color: #166534; }
    .flash-wrong .num { background: #fecaca; color: #991b1b; }

    .text {
      font-size: clamp(15px, 2.05vh, 21px);
      line-height: 1.18;
      font-weight: 850;
      word-break: normal;
      overflow: visible;
      pointer-events: none;
      display: block;
    }

    #fireworks {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: block;
      visibility: hidden;
    }

    #fireworks.show { visibility: visible; }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 31px 1fr;
        gap: 7px;
        padding: 4px 7px;
      }

      .num {
        width: 26px;
        height: 26px;
        font-size: 11px;
      }

      .text {
        font-size: clamp(13px, 1.85vh, 18px);
        line-height: 1.16;
        font-weight: 850;
      }
    }
  </style>
</head>

<body>
  <canvas id="fireworks"></canvas>

  <main class="wrap">
    <div class="topbar">
      <div class="controls">
        <button id="shuffleBtn">
          Karıştır
          <svg class="shuffle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 7h3.7c2.2 0 3.4 1.1 4.8 3.1l1.1 1.6c1.2 1.8 2.2 2.3 4 2.3H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 11l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 17h3.7c1.8 0 2.8-.6 4-2.3l2-3c1.3-2 2.5-4.7 5-4.7H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 4l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button id="checkBtn" class="check">Kontrol Et (3)</button>
      </div>

      <div id="countdown" class="countdown" aria-live="polite">5</div>
    </div>

    <section id="board" class="board" aria-label="Sıralama kartları"></section>
  </main>

  <script>
    function forceFavicon() {
      const canvas = document.createElement("canvas");
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#e30a17";
      ctx.fillRect(0, 0, 64, 64);

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(27, 32, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#e30a17";
      ctx.beginPath();
      ctx.arc(33, 32, 13, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      const cx = 46;
      const cy = 32;
      const outer = 10;
      const inner = 4;

      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + i * Math.PI / 5;
        const r = i % 2 === 0 ? outer : inner;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.closePath();
      ctx.fill();

      document.querySelectorAll("link[rel~='icon'], link[rel='shortcut icon']").forEach(icon => icon.remove());

      const icon = document.createElement("link");
      icon.rel = "icon";
      icon.type = "image/png";
      icon.href = canvas.toDataURL("image/png");
      document.head.appendChild(icon);
    }

    forceFavicon();

    function setAppHeight() {
      document.documentElement.style.setProperty("--app-height", window.innerHeight + "px");
    }

    setAppHeight();
    window.addEventListener("resize", setAppHeight);
    window.addEventListener("orientationchange", () => {
      setTimeout(setAppHeight, 300);
    });

    const lines = [
      "Benim adım Yaşar. Ben bir zaman yolcusuyum.",
      "Dün gece zaman makinemle 2150 yılına gittim.",
      "Hayır, 2150'de arabalar uçmuyor. Ama ilginç bir şey var, kimse konuşmuyor.",
      "Çünkü herkes birbirinin zihnini kolayca okuyabiliyor.",
      "Bir kafeye girdim ve sadece kahve düşündüm.",
      "Robot garson hemen bana sıcak bir kahve getirdi.",
      "Sonra kafeden çıkıp mavi ağaçları olan ilginç bir parka yürüdüm.",
      "Ağaçlar yapraklarıyla çok güzel bir müzik çalıyordu.",
      "Aniden cebimdeki eski telefonum yüksek sesle çaldı.",
      "Herkes şaşkınlıkla bana ve eski telefonuma baktı.",
      "Çok korktum, hemen butona bastım ve 2026'ya döndüm. 😰"
    ];

    const fixed = { id: 1, text: lines[0] };
    let order = [];
    let activeDrag = null;
    let flashTimer = null;
    let countdownTimer = null;
    let checksLeft = 3;
    let gameFrozen = false;

    const board = document.getElementById("board");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const checkBtn = document.getElementById("checkBtn");
    const countdown = document.getElementById("countdown");
    const fireworksCanvas = document.getElementById("fireworks");
    const fireworksCtx = fireworksCanvas.getContext("2d");

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateCheckButton() {
      checkBtn.textContent = `Kontrol Et (${checksLeft})`;
      checkBtn.disabled = checksLeft === 0 || gameFrozen;
      shuffleBtn.disabled = gameFrozen;
    }

    function startGame() {
      clearFlash();
      stopFireworks();
      gameFrozen = false;
      checksLeft = 3;
      activeDrag = null;
      order = shuffle(lines.slice(1).map((text, index) => ({ id: index + 2, text })));
      updateCheckButton();
      render();
    }

    function currentRows() {
      return [fixed, ...order];
    }

    function isComplete() {
      return currentRows().every((row, index) => row.id === index + 1);
    }

    function render() {
      board.innerHTML = "";

      currentRows().forEach((row, index) => {
        const card = document.createElement("article");
        card.className = "row";
        card.dataset.id = row.id;
        card.dataset.index = index;

        if (index > 0 && !gameFrozen) {
          card.classList.add("draggable");
          card.addEventListener("mousedown", handleMouseDown);
          card.addEventListener("touchstart", handleTouchStart, { passive: false });
        } else {
          card.classList.add("locked");
        }

        card.innerHTML = `
          <div class="num">${index + 1}</div>
          <div class="text">${row.text}</div>
        `;

        board.appendChild(card);
      });
    }

    function clearFlash() {
      if (gameFrozen) return;

      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);

      flashTimer = null;
      countdownTimer = null;
      countdown.classList.remove("show");

      document.querySelectorAll(".row").forEach(card => {
        card.classList.remove("flash-correct", "flash-wrong");
      });
    }

    function clearTimersOnly() {
      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);

      flashTimer = null;
      countdownTimer = null;
      countdown.classList.remove("show");
    }

    function startCountdown() {
      let remaining = 5;
      countdown.textContent = remaining;
      countdown.classList.add("show");

      countdownTimer = setInterval(() => {
        remaining -= 1;

        if (remaining > 0) {
          countdown.textContent = remaining;
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          countdown.classList.remove("show");
        }
      }, 1000);
    }

    function paintCheckColors() {
      const rows = currentRows();
      const cards = [...document.querySelectorAll(".row")];

      cards.forEach((card, index) => {
        card.classList.add(rows[index].id === index + 1 ? "flash-correct" : "flash-wrong");
      });
    }

    function freezeGame() {
      gameFrozen = true;
      cleanupDrag();

      document.querySelectorAll(".row").forEach(card => {
        card.classList.remove("draggable", "dragging", "drop-target");
        card.classList.add("locked");
      });

      checkBtn.disabled = true;
      shuffleBtn.disabled = true;
    }

    function checkOrder() {
      if (checksLeft === 0 || gameFrozen) return;

      clearFlash();
      checksLeft -= 1;
      updateCheckButton();
      paintCheckColors();

      const complete = isComplete();
      const finalWrongTry = checksLeft === 0 && !complete;

      if (complete) {
        checkBtn.textContent = "Tamamlandı";
        freezeGame();
        clearTimersOnly();
        startFireworks();
        return;
      }

      if (finalWrongTry) {
        freezeGame();
        clearTimersOnly();
        return;
      }

      startCountdown();

      flashTimer = setTimeout(() => {
        document.querySelectorAll(".row").forEach(card => {
          card.classList.remove("flash-correct", "flash-wrong");
        });
      }, 5000);
    }

    function moveItemToDisplayIndex(id, targetDisplayIndex) {
      if (gameFrozen || id === null || targetDisplayIndex === 0) return false;

      const from = order.findIndex(item => item.id === id);
      const to = targetDisplayIndex - 1;

      if (from === -1 || to === -1 || from === to) return false;

      const [moved] = order.splice(from, 1);
      order.splice(to, 0, moved);

      return true;
    }

    function startDrag(card, clientX, clientY) {
      if (gameFrozen || card.classList.contains("locked")) return;

      clearFlash();

      const rect = card.getBoundingClientRect();
      const clone = card.cloneNode(true);

      clone.classList.add("drag-clone");
      clone.style.left = rect.left + "px";
      clone.style.top = rect.top + "px";
      clone.style.width = rect.width + "px";
      clone.style.height = rect.height + "px";

      document.body.appendChild(clone);
      card.classList.add("dragging");

      activeDrag = {
        id: Number(card.dataset.id),
        source: card,
        clone,
        offsetX: clientX - rect.left,
        offsetY: clientY - rect.top
      };

      document.body.style.cursor = "grabbing";
    }

    function moveDrag(clientX, clientY) {
      if (!activeDrag) return;

      activeDrag.clone.style.left = (clientX - activeDrag.offsetX) + "px";
      activeDrag.clone.style.top = (clientY - activeDrag.offsetY) + "px";

      document.querySelectorAll(".row").forEach(row => {
        row.classList.remove("drop-target");
      });

      const el = document.elementFromPoint(clientX, clientY);
      const target = el ? el.closest(".row") : null;

      if (target && Number(target.dataset.index) !== 0) {
        target.classList.add("drop-target");
      }
    }

    function endDrag(clientX, clientY) {
      if (!activeDrag) return;

      const el = document.elementFromPoint(clientX, clientY);
      const target = el ? el.closest(".row") : null;
      const id = activeDrag.id;

      cleanupDrag();

      if (target) {
        const targetDisplayIndex = Number(target.dataset.index);

        if (moveItemToDisplayIndex(id, targetDisplayIndex)) {
          render();
        }
      }
    }

    function cleanupDrag() {
      if (activeDrag) {
        if (activeDrag.clone) activeDrag.clone.remove();
        if (activeDrag.source) activeDrag.source.classList.remove("dragging");
      }

      document.querySelectorAll(".row").forEach(row => {
        row.classList.remove("drop-target");
      });

      activeDrag = null;
      document.body.style.cursor = "";
    }

    function handleMouseDown(event) {
      if (event.button !== 0) return;
      event.preventDefault();
      startDrag(event.currentTarget, event.clientX, event.clientY);
    }

    window.addEventListener("mousemove", event => {
      if (!activeDrag) return;
      event.preventDefault();
      moveDrag(event.clientX, event.clientY);
    }, { passive: false });

    window.addEventListener("mouseup", event => {
      if (!activeDrag) return;
      event.preventDefault();
      endDrag(event.clientX, event.clientY);
    }, { passive: false });

    function handleTouchStart(event) {
      const touch = event.touches[0];
      if (!touch) return;
      event.preventDefault();
      startDrag(event.currentTarget, touch.clientX, touch.clientY);
    }

    window.addEventListener("touchmove", event => {
      if (!activeDrag) return;
      const touch = event.touches[0];
      if (!touch) return;
      event.preventDefault();
      moveDrag(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener("touchend", event => {
      if (!activeDrag) return;
      const touch = event.changedTouches[0];
      if (!touch) return;
      event.preventDefault();
      endDrag(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener("touchcancel", () => {
      cleanupDrag();
    });

    let particles = [];
    let fireworksAnimation = null;

    function resizeFireworks() {
      fireworksCanvas.width = window.innerWidth;
      fireworksCanvas.height = window.innerHeight;
    }

    function makeBurst(x, y) {
      const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7"];

      for (let i = 0; i < 70; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 75 + Math.random() * 25,
          age: 0,
          size: 2 + Math.random() * 2,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function startFireworks() {
      resizeFireworks();
      fireworksCanvas.classList.add("show");
      fireworksCanvas.style.visibility = "visible";
      particles = [];

      makeBurst(window.innerWidth * .30, window.innerHeight * .28);
      makeBurst(window.innerWidth * .55, window.innerHeight * .20);
      makeBurst(window.innerWidth * .78, window.innerHeight * .32);

      let frames = 0;

      function animate() {
        frames += 1;
        fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

        if (frames === 35) {
          makeBurst(window.innerWidth * .45, window.innerHeight * .38);
        }

        particles.forEach(p => {
          p.age += 1;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += .045;
          p.vx *= .985;
          p.vy *= .985;

          const alpha = Math.max(0, 1 - p.age / p.life);

          fireworksCtx.globalAlpha = alpha;
          fireworksCtx.fillStyle = p.color;
          fireworksCtx.beginPath();
          fireworksCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          fireworksCtx.fill();
        });

        fireworksCtx.globalAlpha = 1;
        particles = particles.filter(p => p.age < p.life);

        if (frames < 110 || particles.length > 0) {
          fireworksAnimation = requestAnimationFrame(animate);
        } else {
          fireworksAnimation = null;
        }
      }

      animate();
    }

    function stopFireworks() {
      if (fireworksAnimation) cancelAnimationFrame(fireworksAnimation);

      fireworksAnimation = null;
      particles = [];

      fireworksCanvas.classList.remove("show");
      fireworksCanvas.style.visibility = "hidden";

      fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }

    window.addEventListener("resize", resizeFireworks);

    checkBtn.addEventListener("click", checkOrder);
    shuffleBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
