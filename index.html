<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sıralama Etkinliği</title>

  <link rel="icon" type="image/png" href="/zamanyolcusu/turkey.png?v=99">
  <link rel="shortcut icon" type="image/png" href="/zamanyolcusu/turkey.png?v=99">
  <link rel="apple-touch-icon" href="/zamanyolcusu/turkey.png?v=99">

  <style>
    :root {
      --card: rgba(255,255,255,.90);
      --text: #17202a;
      --line: rgba(208,213,221,.9);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --ok: #16a34a;
      --wrong: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.18)),
        url("leo-futuristic-bg.png") center / cover no-repeat fixed;
      color: var(--text);
      padding: 5px;
    }

    .wrap {
      width: min(680px, calc(100vw - 10px));
      max-width: 680px;
      height: calc(100dvh - 10px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      height: 36px;
      min-height: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      flex: 0 0 36px;
    }

    .controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 7px 10px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: white;
      font-size: 13px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation;
    }

    button.check { background: var(--blue); }
    button.check:hover:not(:disabled) { background: var(--blue-dark); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button:active:not(:disabled) { transform: translateY(1px); }

    .shuffle-icon {
      width: 16px;
      height: 16px;
      color: currentColor;
      flex: 0 0 auto;
    }

    .countdown {
      width: 42px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(37,99,235,.35);
      font-size: 19px;
      font-weight: 900;
      color: #1d4ed8;
      box-shadow: 0 4px 14px rgba(16,24,40,.14);
      visibility: hidden;
    }

    .countdown.show { visibility: visible; }

    .board {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(11, minmax(0, 1fr));
      gap: 4px;
      touch-action: none;
    }

    .row {
      min-height: 0;
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 5px;
      align-items: center;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 4px 6px;
      box-shadow: 0 3px 10px rgba(16,24,40,.10);
      backdrop-filter: blur(4px);
      transition: border-color .15s ease, background .15s ease, transform .15s ease;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    .row.draggable { cursor: grab; }
    .row.locked { cursor: default; }

    .row.dragging {
      opacity: .25;
      transform: scale(.99);
    }

    .row.drop-target {
      border-color: #2563eb;
      background: rgba(219,234,254,.96);
      box-shadow: 0 0 0 3px rgba(37,99,235,.2), 0 3px 10px rgba(16,24,40,.10);
    }

    .row.flash-correct {
      border-color: var(--ok);
      background: rgba(220,252,231,.94);
    }

    .row.flash-wrong {
      border-color: var(--wrong);
      background: rgba(254,226,226,.94);
    }

    .drag-clone {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
      opacity: .97;
      transform: scale(1.03);
      box-shadow: 0 18px 36px rgba(0,0,0,.28);
    }

    .num {
      width: 25px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #f2f4f7;
      font-weight: 800;
      color: #344054;
      font-size: 11px;
    }

    .flash-correct .num { background: #bbf7d0; color: #166534; }
    .flash-wrong .num { background: #fecaca; color: #991b1b; }

    .text {
      font-size: clamp(8px, 1.7vw, 13px);
      line-height: 1.05;
      font-weight: 650;
      word-break: break-word;
      overflow: hidden;
      pointer-events: none;
    }

    #fireworks {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: block;
      visibility: hidden;
    }

    #fireworks.show { visibility: visible; }

    @media (max-width: 700px) {
      body { padding: 4px; }

      .wrap {
        width: calc(100vw - 8px);
        height: calc(100dvh - 8px);
        gap: 3px;
      }

      .topbar {
        height: 34px;
        min-height: 34px;
        flex-basis: 34px;
      }

      .board { gap: 3px; }

      .row {
        grid-template-columns: 28px 1fr;
        gap: 4px;
        padding: 3px 5px;
        border-radius: 9px;
      }

      .num {
        width: 23px;
        height: 23px;
        font-size: 10px;
      }

      .text {
        font-size: clamp(7.5px, 1.8vw, 11px);
        line-height: 1.03;
      }
    }
  </style>
</head>

<body>
  <canvas id="fireworks"></canvas>

  <main class="wrap">
    <div class="topbar">
      <div class="controls">
        <button id="shuffleBtn">
          Karıştır
          <svg class="shuffle-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 7h3.7c2.2 0 3.4 1.1 4.8 3.1l1.1 1.6c1.2 1.8 2.2 2.3 4 2.3H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 11l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 17h3.7c1.8 0 2.8-.6 4-2.3l2-3c1.3-2 2.5-4.7 5-4.7H21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M18 4l3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button id="checkBtn" class="check">Kontrol Et (3)</button>
      </div>

      <div id="countdown" class="countdown" aria-live="polite">5</div>
    </div>

    <section id="board" class="board" aria-label="Sıralama kartları"></section>
  </main>

  <script>
    const lines = [
      "Benim adım Yaşar. Ben bir zaman yolcusuyum.",
      "Dün gece zaman makinemle 2150 yılına gittim.",
      "Hayır, 2150'de arabalar uçmuyor. Ama ilginç bir şey var, kimse konuşmuyor.",
      "Çünkü herkes birbirinin zihnini kolayca okuyabiliyor.",
      "Bir kafeye girdim ve sadece kahve düşündüm.",
      "Robot garson hemen bana sıcak bir kahve getirdi.",
      "Sonra kafeden çıkıp mavi ağaçları olan ilginç bir parka yürüdüm.",
      "Ağaçlar yapraklarıyla çok güzel bir müzik çalıyordu.",
      "Aniden cebimdeki eski telefonum yüksek sesle çaldı.",
      "Herkes şaşkınlıkla bana ve eski telefonuma baktı.",
      "Çok korktum, hemen butona bastım ve 2026'ya döndüm. 😰"
    ];

    const fixed = { id: 1, text: lines[0] };
    let order = [];
    let draggedId = null;
    let touchDrag = null;
    let flashTimer = null;
    let countdownTimer = null;
    let checksLeft = 3;
    let gameFrozen = false;

    const board = document.getElementById("board");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const checkBtn = document.getElementById("checkBtn");
    const countdown = document.getElementById("countdown");
    const fireworksCanvas = document.getElementById("fireworks");
    const fireworksCtx = fireworksCanvas.getContext("2d");

    function shuffle(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function updateCheckButton() {
      checkBtn.textContent = `Kontrol Et (${checksLeft})`;
      checkBtn.disabled = checksLeft === 0 || gameFrozen;
      shuffleBtn.disabled = gameFrozen;
    }

    function startGame() {
      clearFlash();
      stopFireworks();
      gameFrozen = false;
      checksLeft = 3;
      draggedId = null;
      touchDrag = null;
      order = shuffle(lines.slice(1).map((text, index) => ({ id: index + 2, text })));
      updateCheckButton();
      render();
    }

    function currentRows() {
      return [fixed, ...order];
    }

    function isComplete() {
      return currentRows().every((row, index) => row.id === index + 1);
    }

    function render() {
      board.innerHTML = "";

      currentRows().forEach((row, index) => {
        const card = document.createElement("article");

        card.className = "row";
        card.dataset.id = row.id;
        card.dataset.index = index;

        card.addEventListener("dragover", handleDragOver);
        card.addEventListener("drop", handleDrop);

        if (index > 0 && !gameFrozen) {
          card.classList.add("draggable");
          card.draggable = true;

          card.addEventListener("dragstart", handleDragStart);
          card.addEventListener("dragend", handleDragEnd);

          card.addEventListener("pointerdown", handlePointerDown);
          card.addEventListener("pointermove", handlePointerMove);
          card.addEventListener("pointerup", handlePointerUp);
          card.addEventListener("pointercancel", handlePointerCancel);
        } else {
          card.classList.add("locked");
        }

        card.innerHTML = `
          <div class="num">${index + 1}</div>
          <div class="text">${row.text}</div>
        `;

        board.appendChild(card);
      });
    }

    function clearFlash() {
      if (gameFrozen) return;

      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);

      flashTimer = null;
      countdownTimer = null;
      countdown.classList.remove("show");

      document.querySelectorAll(".row").forEach(card => {
        card.classList.remove("flash-correct", "flash-wrong");
      });
    }

    function clearTimersOnly() {
      if (flashTimer) clearTimeout(flashTimer);
      if (countdownTimer) clearInterval(countdownTimer);

      flashTimer = null;
      countdownTimer = null;
      countdown.classList.remove("show");
    }

    function startCountdown() {
      let remaining = 5;
      countdown.textContent = remaining;
      countdown.classList.add("show");

      countdownTimer = setInterval(() => {
        remaining -= 1;

        if (remaining > 0) {
          countdown.textContent = remaining;
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          countdown.classList.remove("show");
        }
      }, 1000);
    }

    function paintCheckColors() {
      const rows = currentRows();
      const cards = [...document.querySelectorAll(".row")];

      cards.forEach((card, index) => {
        card.classList.add(rows[index].id === index + 1 ? "flash-correct" : "flash-wrong");
      });
    }

    function freezeGame() {
      gameFrozen = true;
      draggedId = null;
      touchDrag = null;

      document.querySelectorAll(".row").forEach(card => {
        card.draggable = false;
        card.classList.remove("draggable", "dragging", "drop-target");
        card.classList.add("locked");
      });

      checkBtn.disabled = true;
      shuffleBtn.disabled = true;
    }

    function checkOrder() {
      if (checksLeft === 0 || gameFrozen) return;

      clearFlash();
      checksLeft -= 1;
      updateCheckButton();
      paintCheckColors();

      const complete = isComplete();
      const finalWrongTry = checksLeft === 0 && !complete;

      if (complete) {
        checkBtn.textContent = "Tamamlandı";
        freezeGame();
        clearTimersOnly();
        startFireworks();
        return;
      }

      if (finalWrongTry) {
        freezeGame();
        clearTimersOnly();
        return;
      }

      startCountdown();

      flashTimer = setTimeout(() => {
        document.querySelectorAll(".row").forEach(card => {
          card.classList.remove("flash-correct", "flash-wrong");
        });
      }, 5000);
    }

    function moveItemToDisplayIndex(id, targetDisplayIndex) {
      if (gameFrozen || id === null || targetDisplayIndex === 0) return false;

      const from = order.findIndex(item => item.id === id);
      const to = targetDisplayIndex - 1;

      if (from === -1 || to === -1 || from === to) return false;

      const [moved] = order.splice(from, 1);
      order.splice(to, 0, moved);

      return true;
    }

    function handleDragStart(event) {
      if (gameFrozen) return;

      clearFlash();

      draggedId = Number(event.currentTarget.dataset.id);
      event.currentTarget.classList.add("dragging");

      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", String(draggedId));
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
      draggedId = null;
    }

    function handleDragOver(event) {
      if (gameFrozen) return;

      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
    }

    function handleDrop(event) {
      if (gameFrozen) return;

      event.preventDefault();

      const targetDisplayIndex = Number(event.currentTarget.dataset.index);

      if (moveItemToDisplayIndex(draggedId, targetDisplayIndex)) {
        render();
      }
    }

    function handlePointerDown(event) {
      if (gameFrozen) return;
      if (event.pointerType === "mouse") return;
      if (event.currentTarget.classList.contains("locked")) return;

      clearFlash();

      const card = event.currentTarget;
      const rect = card.getBoundingClientRect();

      const clone = card.cloneNode(true);
      clone.classList.add("drag-clone");
      clone.style.left = rect.left + "px";
      clone.style.top = rect.top + "px";
      clone.style.width = rect.width + "px";
      clone.style.height = rect.height + "px";

      document.body.appendChild(clone);

      touchDrag = {
        id: Number(card.dataset.id),
        pointerId: event.pointerId,
        source: card,
        clone: clone,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top
      };

      card.classList.add("dragging");

      try {
        card.setPointerCapture(event.pointerId);
      } catch (e) {}

      event.preventDefault();
    }

    function handlePointerMove(event) {
      if (!touchDrag) return;
      if (touchDrag.pointerId !== event.pointerId) return;

      touchDrag.clone.style.left = (event.clientX - touchDrag.offsetX) + "px";
      touchDrag.clone.style.top = (event.clientY - touchDrag.offsetY) + "px";

      document.querySelectorAll(".row").forEach(row => {
        row.classList.remove("drop-target");
      });

      const el = document.elementFromPoint(event.clientX, event.clientY);
      const target = el ? el.closest(".row") : null;

      if (target && Number(target.dataset.index) !== 0) {
        target.classList.add("drop-target");
      }

      event.preventDefault();
    }

    function handlePointerUp(event) {
      if (!touchDrag) return;
      if (touchDrag.pointerId !== event.pointerId) return;

      const el = document.elementFromPoint(event.clientX, event.clientY);
      const target = el ? el.closest(".row") : null;

      const clone = touchDrag.clone;
      const source = touchDrag.source;
      const id = touchDrag.id;

      if (clone) clone.remove();
      if (source) source.classList.remove("dragging");

      document.querySelectorAll(".row").forEach(row => {
        row.classList.remove("drop-target");
      });

      touchDrag = null;

      if (target) {
        const targetDisplayIndex = Number(target.dataset.index);

        if (moveItemToDisplayIndex(id, targetDisplayIndex)) {
          render();
        }
      }

      event.preventDefault();
    }

    function handlePointerCancel(event) {
      if (!touchDrag) return;

      if (touchDrag.clone) touchDrag.clone.remove();
      if (touchDrag.source) touchDrag.source.classList.remove("dragging");

      document.querySelectorAll(".row").forEach(row => {
        row.classList.remove("drop-target");
      });

      touchDrag = null;
    }

    let particles = [];
    let fireworksAnimation = null;

    function resizeFireworks() {
      fireworksCanvas.width = window.innerWidth;
      fireworksCanvas.height = window.innerHeight;
    }

    function makeBurst(x, y) {
      const colors = ["#ef4444", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7"];

      for (let i = 0; i < 70; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 75 + Math.random() * 25,
          age: 0,
          size: 2 + Math.random() * 2,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function startFireworks() {
      resizeFireworks();

      fireworksCanvas.classList.add("show");
      fireworksCanvas.style.visibility = "visible";

      particles = [];

      makeBurst(window.innerWidth * .30, window.innerHeight * .28);
      makeBurst(window.innerWidth * .55, window.innerHeight * .20);
      makeBurst(window.innerWidth * .78, window.innerHeight * .32);

      let frames = 0;

      function animate() {
        frames += 1;

        fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

        if (frames === 35) {
          makeBurst(window.innerWidth * .45, window.innerHeight * .38);
        }

        particles.forEach(p => {
          p.age += 1;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += .045;
          p.vx *= .985;
          p.vy *= .985;

          const alpha = Math.max(0, 1 - p.age / p.life);

          fireworksCtx.globalAlpha = alpha;
          fireworksCtx.fillStyle = p.color;
          fireworksCtx.beginPath();
          fireworksCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          fireworksCtx.fill();
        });

        fireworksCtx.globalAlpha = 1;
        particles = particles.filter(p => p.age < p.life);

        if (frames < 110 || particles.length > 0) {
          fireworksAnimation = requestAnimationFrame(animate);
        } else {
          fireworksAnimation = null;
        }
      }

      animate();
    }

    function stopFireworks() {
      if (fireworksAnimation) cancelAnimationFrame(fireworksAnimation);

      fireworksAnimation = null;
      particles = [];

      fireworksCanvas.classList.remove("show");
      fireworksCanvas.style.visibility = "hidden";

      fireworksCtx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }

    window.addEventListener("resize", resizeFireworks);

    checkBtn.addEventListener("click", checkOrder);
    shuffleBtn.addEventListener("click", startGame);

    startGame();
  </script>
</body>
</html>
